<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>カメラで振る棒 対戦モード</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Inter:wght@400;600&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #0a0a12;
            color: #e0e0ff;
            font-family: 'Noto Sans JP', 'Inter', system-ui, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        
        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 52px;
            background: rgba(10, 10, 18, 0.92);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 200;
        }
        
        #header h1 {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        
        .controls {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: #e0e0ff;
            padding: 6px 10px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            touch-action: manipulation;
        }
        
        button:active {
            background: rgba(255,255,255,0.22);
            transform: scale(0.95);
        }
        
        #main {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        
        #status {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,10,18,0.85);
            padding: 6px 18px;
            border-radius: 9999px;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 150;
            white-space: nowrap;
        }
        
        .info {
            position: fixed;
            top: 60px;
            left: 16px;
            right: 16px;
            background: rgba(10,10,18,0.75);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 12px;
            line-height: 1.5;
            border: 1px solid rgba(255,255,255,0.08);
            z-index: 100;
            max-width: 420px;
            margin: 0 auto;
        }
        
        .hidden { display: none !important; }
        
        .player-label {
            font-size: 11px;
            font-weight: 700;
            padding: 1px 7px;
            border-radius: 4px;
            margin-left: 6px;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>📹 カメラで振る棒 対戦</h1>
        <div class="controls">
            <button id="themeBtn">🎬リアル</button>
            <button id="modeBtn">2人対戦モード</button>
            <button id="cameraBtn">📷</button>
            <button id="muteBtn">🔊</button>
        </div>
    </div>

    <div id="main">
        <canvas id="canvas"></canvas>
    </div>

    <div id="status"></div>
    
    <div class="info" id="infoBox">
        <strong>使い方</strong><br>
        1. 棒の<strong>先端</strong>に明るい色のテープやマーカーを貼る（<span style="color:#ff6b6b">赤</span> or <span style="color:#60a5fa">青</span>がおすすめ）<br>
        2. カメラにかざして振る → 速さに応じていろんな効果音が鳴ります<br>
        3. 棒で<strong>大きく円を描く</strong>とリングが溜まって ⚡必殺技！<br>
        4. 2人対戦モードで2本の棒を<strong>ぶつけ合う</strong>と衝撃音＆火花！<br>
        5. <strong>⚡ボタン</strong>で音のテーマを切替：ビーム / サムライ / ヒーロー / ノーマル
    </div>

        };

        const sampleBuffers = {};

        function base64ToArrayBuffer(b64) {
            const bin = atob(b64);
            const arr = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
            return arr.buffer;
        }

        function loadSamples() {
            for (const [key, b64] of Object.entries(SAMPLES_B64)) {
                audioCtx.decodeAudioData(base64ToArrayBuffer(b64))
                    .then(buf => { sampleBuffers[key] = buf; })
                    .catch(err => console.warn('sample decode failed:', key, err));
            }
        }

        function playSample(key, out, { rate = 1, vol = 1, when = 0 } = {}) {
            const buf = sampleBuffers[key];
            if (!buf) return false;
            const src = audioCtx.createBufferSource();
            src.buffer = buf;
            src.playbackRate.value = rate;
            const g = audioCtx.createGain();
            g.gain.value = vol;
            src.connect(g);
            g.connect(out);
            src.start(audioCtx.currentTime + when);
            return true;
        }
        
        // Tracking state
        let trackers = {
            red: { x: 0, y: 0, prevX: 0, prevY: 0, vel: 0, dirX: 0, wasFast: false, size: 0, active: false, lastTrigger: 0, history: [], charge: 0, lastSpecial: 0, specialFlashUntil: 0, color: {r:235, g:55, b:55} },
            blue: { x: 0, y: 0, prevX: 0, prevY: 0, vel: 0, dirX: 0, wasFast: false, size: 0, active: false, lastTrigger: 0, history: [], charge: 0, lastSpecial: 0, specialFlashUntil: 0, color: {r:70, g:130, b:235} }
        };

        // Effects state
        let particles = []; // analysis-space coordinates
        let prevPairDist = null;
        let lastImpact = 0;
        let screenFlash = { alpha: 0, color: '255,255,255' };
        
        let analysisW = 320;
        let analysisH = 240;
        let analysisCanvas = document.createElement('canvas');
        let analysisCtx = analysisCanvas.getContext('2d', { willReadFrequently: true });
        
        let lastFrameTime = performance.now();
        let stream = null;
        let usingFrontCamera = false;
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            analysisCanvas.width = analysisW;
            analysisCanvas.height = analysisH;
        }
        
        let master = null; // { input, reverb }

        // Exponentially decaying stereo noise = simple hall impulse response
        function makeImpulseResponse(duration, decay) {
            const rate = audioCtx.sampleRate;
            const len = Math.floor(rate * duration);
            const buffer = audioCtx.createBuffer(2, len, rate);
            for (let ch = 0; ch < 2; ch++) {
                const data = buffer.getChannelData(ch);
                for (let i = 0; i < len; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
                }
            }
            return buffer;
        }

        function initAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();

                // Master bus: everything runs through a compressor (glue +
                // no clipping when layers stack) and a shared reverb send
                const compressor = audioCtx.createDynamicsCompressor();
                compressor.threshold.value = -18;
                compressor.knee.value = 12;
                compressor.ratio.value = 4;
                compressor.attack.value = 0.004;
                compressor.release.value = 0.18;
                compressor.connect(audioCtx.destination);

                const input = audioCtx.createGain();
                input.gain.value = 0.9;
                input.connect(compressor);

                const convolver = audioCtx.createConvolver();
                convolver.buffer = makeImpulseResponse(1.9, 2.8);
                const wet = audioCtx.createGain();
                wet.gain.value = 0.9;
                convolver.connect(wet);
                wet.connect(compressor);

                master = { input, reverb: convolver };

                loadSamples();
            } catch(e) {}
        }
        
        function makeNoiseBuffer(duration, shape = 1.05) {
            const sampleRate = audioCtx.sampleRate;
            const buffer = audioCtx.createBuffer(1, Math.floor(sampleRate * duration), sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) {
                const t = i / data.length;
                data[i] = (Math.random() * 2 - 1) * Math.max(0, 1 - t * shape);
            }
            return buffer;
        }

        // Output node with dry signal to the master bus plus a reverb send.
        // reverbAmount ~0.1 = dry-ish swing, ~0.4 = ringing cinematic tail.
        function makePanner(pan, reverbAmount = 0.16) {
            const panner = audioCtx.createStereoPanner();
            panner.pan.value = Math.max(-0.9, Math.min(0.9, pan));
            panner.connect(master.input);
            if (reverbAmount > 0) {
                const send = audioCtx.createGain();
                send.gain.value = reverbAmount;
                panner.connect(send);
                send.connect(master.reverb);
            }
            return panner;
        }

        function playWhoosh(velocity, playerKey, pan = 0, dir = 0) {
            if (!audioCtx || isMuted) return;

            const tracker = trackers[playerKey];
            const now = performance.now();
            if (now - tracker.lastTrigger < 110) return;
            tracker.lastTrigger = now;

            // Doppler-style pan sweep: the sound travels in the swing direction
            const clampPan = v => Math.max(-0.9, Math.min(0.9, v));
            const out = makePanner(clampPan(pan - dir * 0.35));
            out.pan.linearRampToValueAtTime(clampPan(pan + dir * 0.35), audioCtx.currentTime + 0.32);

            switch (soundTheme) {
                case 'real': realSwing(velocity, out); break;
                case 'beam': beamSwing(velocity, out); break;
                case 'samurai': samuraiSwing(velocity, out); break;
                case 'hero': heroSwing(velocity, out); break;
                default: standardSwing(velocity, out);
            }
        }

        // ============ 🎬 REAL theme (recorded samples) ============
        // Falls back to the synth theme until samples finish decoding

        function realSwing(velocity, out) {
            const ok = playSample('whoosh', out, {
                rate: 0.8 + Math.min(velocity * 0.09, 0.7) + Math.random() * 0.15,
                vol: Math.min(0.9, 0.35 + velocity * 0.09)
            });
            if (!ok) standardSwing(velocity, out);
        }

        function realImpact(intensity, out) {
            const heavy = intensity > 1.0;
            const pick = heavy
                ? (Math.random() < 0.5 ? 'rock' : 'punch')
                : ['punch', 'hit1', 'hit2'][Math.floor(Math.random() * 3)];
            const ok = playSample(pick, out, {
                rate: 0.92 + Math.random() * 0.16,
                vol: Math.min(1, 0.5 + intensity * 0.4)
            });
            if (!ok) { standardImpact(intensity, out); return; }
            if (heavy) playSample('boom', out, { rate: 1.2, vol: 0.3 });

            // Synth sub thump under the recording for physical weight
            const t0 = audioCtx.currentTime;
            const sub = audioCtx.createOscillator();
            sub.type = 'sine';
            sub.frequency.setValueAtTime(90, t0);
            sub.frequency.exponentialRampToValueAtTime(40, t0 + 0.22);
            const sg = audioCtx.createGain();
            sg.gain.setValueAtTime(Math.min(0.6, intensity * 0.4), t0);
            sg.gain.exponentialRampToValueAtTime(0.001, t0 + 0.24);
            sub.connect(sg);
            sg.connect(out);
            sub.start(t0);
            sub.stop(t0 + 0.26);
        }

        function realSpecial(out) {

        function standardSwing(velocity, out) {
            // Pick a variant: heavy swings get a low "buon", otherwise
            // randomly alternate between the airy whoosh and a sharp swish
            const r = Math.random();
            if (velocity > 3.2 && r < 0.5) {
                whooshHeavy(velocity, out);
            } else if (r < 0.45) {
                whooshSwish(velocity, out);
            } else {
                whooshAiry(velocity, out);
            }

        // Variant 1: airy noise whoosh (the original sound)
        function whooshAiry(velocity, out) {
            const duration = 0.42;
            const source = audioCtx.createBufferSource();
            source.buffer = makeNoiseBuffer(duration);

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = Math.min(4800, 720 + velocity * 260);
            filter.Q.value = 1.1;

            const shelf = audioCtx.createBiquadFilter();
            shelf.type = 'highshelf';
            shelf.frequency.value = 2600;
            shelf.gain.value = Math.min(5, velocity * 0.9);

            const gain = audioCtx.createGain();
            const vol = Math.min(0.85, 0.22 + velocity * 0.07);

            source.playbackRate.value = 0.8 + Math.min(velocity * 0.065, 1.4);

            const audioNow = audioCtx.currentTime;
            gain.gain.setValueAtTime(vol, audioNow);
            gain.gain.linearRampToValueAtTime(0.001, audioNow + duration * 0.82);

            source.connect(filter);
            filter.connect(shelf);
            shelf.connect(gain);
            gain.connect(out);

            source.start(audioNow);

        // ============ ⚡ BEAM theme (lightsaber-style energy blade) ============

        // Persistent low hum while a marker is visible — the signature beam sound
        const humState = { red: null, blue: null };

        function ensureHum(key) {
            if (!audioCtx || humState[key]) return;
            const gain = audioCtx.createGain();
            gain.gain.value = 0;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 620;
            filter.Q.value = 2;
            const panner = makePanner(0, 0.07);

            // Two detuned saws beating against each other = electric hum
            const baseF = key === 'red' ? 66 : 58;
            const oscs = [0, 9].map(det => {
                const o = audioCtx.createOscillator();
                o.type = 'sawtooth';
                o.frequency.value = baseF;
                o.detune.value = det;
                o.connect(filter);
                o.start();
                return o;
            });

            // Sub sine an octave down: body without harshness
            const sub = audioCtx.createOscillator();
            sub.type = 'sine';
            sub.frequency.value = baseF / 2;
            const subGain = audioCtx.createGain();
            subGain.gain.value = 0.6;
            sub.connect(subGain);
            subGain.connect(filter);
            sub.start();

            // Slow amplitude wobble so the idle hum feels alive, not static
            const lfo = audioCtx.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.value = 5.2;
            const lfoDepth = audioCtx.createGain();
            lfoDepth.gain.value = 0.006;
            lfo.connect(lfoDepth);
            lfoDepth.connect(gain.gain);
            lfo.start();

            filter.connect(gain);
            gain.connect(panner);
            humState[key] = { oscs, sub, gain, panner, baseF };
        }

        function updateHums() {
            if (!audioCtx || !master) return;
            const tc = audioCtx.currentTime;
            for (const key of ['red', 'blue']) {
                const t = trackers[key];
                const shouldPlay = soundTheme === 'beam' && !isMuted && t.active
                    && (key === 'red' || currentMode === 'duel');
                if (shouldPlay) ensureHum(key);
                const h = humState[key];
                if (!h) continue;

                // Barely audible at rest; swells only while actually swinging
                const motion = Math.max(0, t.vel - 25);
                const target = shouldPlay ? Math.min(0.11, 0.016 + motion * 0.0009) : 0;
                h.gain.gain.setTargetAtTime(target, tc, shouldPlay ? 0.05 : 0.12);
                // Doppler-ish pitch rise while swinging
                const freq = h.baseF * (1 + Math.min(t.vel, 260) * 0.0022);
                h.oscs.forEach(o => o.frequency.setTargetAtTime(freq, tc, 0.06));
                h.sub.frequency.setTargetAtTime(freq / 2, tc, 0.06);
                h.panner.pan.setTargetAtTime(
                    currentMode === 'duel' ? (key === 'red' ? -0.5 : 0.5) : 0, tc, 0.2);
            }
        }

        // Swing: resonant saw sweep up-and-down over the hum ("vwoom")

                osc.connect(lp);
                lp.connect(g);
                g.connect(out);
                osc.start(t0);

            bp.connect(ng);
            ng.connect(out);
            noise.start(t0);

        // ============ 🗡️ SAMURAI theme (katana) ============

            shingG.gain.linearRampToValueAtTime(0.001, t0 + 0.4);
            shing.connect(shingHp);
            shingHp.connect(shingG);
            shingG.connect(out);
            shing.start(t0);

            // Ringing shimmer on top
            [2400, 3600].forEach((f, i) => {
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(f, t0);
                osc.frequency.exponentialRampToValueAtTime(f * 1.9, t0 + 0.35);
                const g = audioCtx.createGain();
                g.gain.setValueAtTime(0.001, t0);
                g.gain.exponentialRampToValueAtTime(0.18 / (i + 1), t0 + 0.3);
                g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.75);
                osc.connect(g);
                g.connect(out);
                osc.start(t0);
                osc.stop(t0 + 0.8);
            });

            // Taiko "don"
            const boomAt = t0 + 0.42;
            const don = audioCtx.createOscillator();
            don.type = 'sine';
            don.frequency.setValueAtTime(105, boomAt);
            don.frequency.exponentialRampToValueAtTime(38, boomAt + 0.5);
            const dg = audioCtx.createGain();
            dg.gain.setValueAtTime(0.95, boomAt);
            dg.gain.exponentialRampToValueAtTime(0.001, boomAt + 0.55);
            don.connect(dg);
            dg.connect(out);
            don.start(boomAt);
            don.stop(boomAt + 0.6);

            const skin = audioCtx.createBufferSource();
            skin.buffer = makeNoiseBuffer(0.3, 1.0);
            const skinLp = audioCtx.createBiquadFilter();
            skinLp.type = 'lowpass';
            skinLp.frequency.value = 420;
            const sg = audioCtx.createGain();
            sg.gain.setValueAtTime(0.5, boomAt);
            sg.gain.linearRampToValueAtTime(0.001, boomAt + 0.3);
            skin.connect(skinLp);
            skinLp.connect(sg);
            sg.connect(out);
            skin.start(boomAt);
        }

        // ============ 🚀 HERO theme (sci-fi hero) ============

        // Swing: laser zap — pitch dive (or rise) square wave
        function heroSwing(velocity, out) {
            const t0 = audioCtx.currentTime;
            const dur = 0.16;
            const start = 650 + Math.min(velocity * 240, 1400);
            const goingUp = Math.random() < 0.35;

            const osc = audioCtx.createOscillator();
            osc.type = 'square';
            if (goingUp) {
                osc.frequency.setValueAtTime(start * 0.35, t0);
                osc.frequency.exponentialRampToValueAtTime(start * 1.5, t0 + dur);
            } else {
                osc.frequency.setValueAtTime(start, t0);
                osc.frequency.exponentialRampToValueAtTime(start * 0.16, t0 + dur);
            }

            const lp = audioCtx.createBiquadFilter();
            lp.type = 'lowpass';
            lp.frequency.value = 3200;

            const g = audioCtx.createGain();
            const vol = Math.min(0.5, 0.22 + velocity * 0.05);
            g.gain.setValueAtTime(vol, t0);
            g.gain.linearRampToValueAtTime(0.001, t0 + dur + 0.03);

            osc.connect(lp);
            lp.connect(g);
            g.connect(out);
            osc.start(t0);
            osc.stop(t0 + dur + 0.05);

            // High sparkle tail
            const spark = audioCtx.createOscillator();
            spark.type = 'sine';
            spark.frequency.setValueAtTime(start * 2.2, t0);
            spark.frequency.exponentialRampToValueAtTime(start * 0.9, t0 + 0.09);
            const sg = audioCtx.createGain();
            sg.gain.setValueAtTime(vol * 0.3, t0);
            sg.gain.exponentialRampToValueAtTime(0.001, t0 + 0.09);
            spark.connect(sg);
            sg.connect(out);
            spark.start(t0);
            spark.stop(t0 + 0.1);
        }

        // Impact: electric burst — beating squares + noise + sub drop
        function heroImpact(intensity, out) {

            const sub = audioCtx.createOscillator();

            subG.connect(out);
            sub.start(t0);

        // Special: power-up arpeggio then a big sci-fi boom
        function heroSpecial(out) {
            const t0 = audioCtx.currentTime;
            const notes = [330, 440, 587, 784, 1047];
            const step = 0.075;

            notes.forEach((f, i) => {
                const at = t0 + i * step;

                g.gain.exponentialRampToValueAtTime(0.001, at + step * 1.6);
                osc.connect(lp);
                lp.connect(g);
                g.connect(out);
                osc.start(at);
                osc.stop(at + step * 1.8);
            });

            const boomAt = t0 + notes.length * step + 0.03;
            const sub = audioCtx.createOscillator();
            sub.type = 'sine';
            sub.frequency.setValueAtTime(150, boomAt);
            sub.frequency.exponentialRampToValueAtTime(40, boomAt + 0.55);
            const subG = audioCtx.createGain();
            subG.gain.setValueAtTime(0.9, boomAt);
            subG.gain.exponentialRampToValueAtTime(0.001, boomAt + 0.6);
            sub.connect(subG);
            subG.connect(out);
            sub.start(boomAt);
            sub.stop(boomAt + 0.65);

            const wash = audioCtx.createBufferSource();
            wash.buffer = makeNoiseBuffer(0.5, 0.85);
            const washLp = audioCtx.createBiquadFilter();
            washLp.type = 'lowpass';
            washLp.frequency.setValueAtTime(2800, boomAt);
            washLp.frequency.exponentialRampToValueAtTime(260, boomAt + 0.45);
            const wg = audioCtx.createGain();
            wg.gain.setValueAtTime(0.6, boomAt);
            wg.gain.linearRampToValueAtTime(0.001, boomAt + 0.5);
            wash.connect(washLp);
            washLp.connect(wg);
            wg.connect(out);
            wash.start(boomAt);

            // Heroic shimmer over the boom
            const shine = audioCtx.createOscillator();
            shine.type = 'sine';
            shine.frequency.value = 1568;
            const shg = audioCtx.createGain();
            shg.gain.setValueAtTime(0.16, boomAt);
            shg.gain.exponentialRampToValueAtTime(0.001, boomAt + 0.5);
            shine.connect(shg);
            shg.connect(out);
            shine.start(boomAt);
            shine.stop(boomAt + 0.55);

        function findColorCentroid(imageData, targetR, targetG, targetB, tolerance = 68) {
            let sumX = 0, sumY = 0, count = 0;
            const data = imageData.data;
            const w = imageData.width;
            const h = imageData.height;
            
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                
                const dist = Math.abs(r - targetR) + Math.abs(g - targetG) + Math.abs(b - targetB);
                if (dist < tolerance) {
                    const idx = i / 4;
                    const x = idx % w;
                    const y = Math.floor(idx / w);
                    sumX += x;
                    sumY += y;
                    count++;
                }
            }
            
            if (count < 25) return null;
            
            return {
                x: sumX / count,
                y: sumY / count,
                size: count
            };
        }
        
        // How much of a full circle the recent motion path covers (1.0 = full turn)
        function computeWinding(history) {
            let total = 0;
            let prevAngle = null;
            for (let i = 1; i < history.length; i++) {
                const dx = history[i].x - history[i - 1].x;
                const dy = history[i].y - history[i - 1].y;
                if (Math.hypot(dx, dy) < 2.5) continue; // skip jitter
                const ang = Math.atan2(dy, dx);
                if (prevAngle !== null) {
                    let d = ang - prevAngle;
                    while (d > Math.PI) d -= Math.PI * 2;
                    while (d < -Math.PI) d += Math.PI * 2;
                    total += d;
                }
                prevAngle = ang;
            }
            return Math.abs(total) / (Math.PI * 2);
        }

        function updateTracker(trackerKey, newBlob, dt) {
            const t = trackers[trackerKey];
            if (!newBlob) {
                t.active = false;
                t.vel = 0;
                t.history.length = 0;
                t.charge = 0;
                return;
            }
            
            // Smooth position (reduce jitter)
            const smooth = 0.72;
            if (!t.active) {
                t.x = newBlob.x;
                t.y = newBlob.y;
            } else {
                t.x = t.x * smooth + newBlob.x * (1 - smooth);
                t.y = t.y * smooth + newBlob.y * (1 - smooth);
            }
            
            t.size = newBlob.size;
            t.active = true;
            
            // Velocity (pixels per second in analysis space)
            const dx = t.x - t.prevX;
            const dy = t.y - t.prevY;
            const speed = Math.hypot(dx, dy) / Math.max(dt, 0.016);
            
            t.vel = t.vel * 0.6 + speed * 0.4; // smooth velocity
            if (Math.abs(dx) > 0.8) {
                t.dirX = t.dirX * 0.5 + Math.sign(dx) * 0.5; // smoothed horizontal swing direction
            }

            t.prevX = t.x;
            t.prevY = t.y;

            // Record path for circle-gesture (special move) detection
            const now = performance.now();
            t.history.push({ x: t.x, y: t.y, time: now });
            while (t.history.length && now - t.history[0].time > 950) {
                t.history.shift();
            }
            t.charge = Math.min(1, computeWinding(t.history));
        }

        function spawnParticles(x, y, count, colorStr, speedScale = 1) {
            for (let i = 0; i < count; i++) {
                const ang = Math.random() * Math.PI * 2;
                const spd = (30 + Math.random() * 120) * speedScale;
                particles.push({
                    x, y,
                    vx: Math.cos(ang) * spd,
                    vy: Math.sin(ang) * spd,
                    life: 1,
                    decay: 1.4 + Math.random() * 1.6,
                    size: 1.5 + Math.random() * 2.5,
                    color: colorStr
                });
            }
        }

        function triggerSpecial(playerKey) {
            const t = trackers[playerKey];
            const now = performance.now();
            t.lastSpecial = now;
            t.specialFlashUntil = now + 900;
            t.history.length = 0;
            t.charge = 0;

            const pan = currentMode === 'duel' ? (playerKey === 'red' ? -0.65 : 0.65) : 0;
            playSpecial(pan);

            const colorStr = playerKey === 'red' ? '255,107,107' : '96,165,250';
            spawnParticles(t.x, t.y, 46, colorStr, 1.6);
            screenFlash.alpha = 0.45;
            screenFlash.color = colorStr;
        }
        
        function processFrame() {
            if (!video.videoWidth || video.paused || video.ended) return;
            
            const now = performance.now();
            const dt = (now - lastFrameTime) / 1000;
            lastFrameTime = now;
            
            // Draw video to analysis canvas (downscaled)
            analysisCtx.drawImage(video, 0, 0, analysisW, analysisH);
            const imageData = analysisCtx.getImageData(0, 0, analysisW, analysisH);
            
            // Track red
            const redBlob = findColorCentroid(imageData, 
                trackers.red.color.r, trackers.red.color.g, trackers.red.color.b, 65);
            updateTracker('red', redBlob, dt);
            
            // Track blue (only in duel mode)
            let blueBlob = null;
            if (currentMode === 'duel') {
                blueBlob = findColorCentroid(imageData,
                    trackers.blue.color.r, trackers.blue.color.g, trackers.blue.color.b, 72);
                updateTracker('blue', blueBlob, dt);
            } else {
                trackers.blue.active = false;
            }
            
            // Continuous beam hum follows marker state every frame
            updateHums();

            // Sound triggers — one shot at the START of each swing (edge
            // trigger), re-armed after slowing down or 420ms of sustain.
            // Continuous retriggering sounded like a machine gun.
            const redSpeed = trackers.red.vel;
            const blueSpeed = trackers.blue.vel;

            for (const key of ['red', 'blue']) {
                if (key === 'blue' && currentMode !== 'duel') continue;
                const t = trackers[key];
                const fast = t.active && t.vel > 42;
                if (fast && (!t.wasFast || now - t.lastTrigger > 420)) {
                    const basePan = currentMode === 'duel' ? (key === 'red' ? -0.55 : 0.55) : 0;
                    playWhoosh(t.vel / 28, key, basePan, t.dirX);
                }
                t.wasFast = t.active && t.vel > 30;
            }
            
            // Special move: draw a full circle within ~1 second to fire
            for (const key of ['red', 'blue']) {
                if (key === 'blue' && currentMode !== 'duel') continue;
                const t = trackers[key];
                if (t.active && t.charge >= 0.92 && now - t.lastSpecial > 3000) {
                    triggerSpecial(key);
                }
            }

            // Impact: the two markers rushing into each other
            if (currentMode === 'duel' && trackers.red.active && trackers.blue.active) {
                const dx = trackers.red.x - trackers.blue.x;
                const dy = trackers.red.y - trackers.blue.y;
                const dist = Math.hypot(dx, dy);

                if (prevPairDist !== null) {
                    const approach = (prevPairDist - dist) / Math.max(dt, 0.016);
                    if (dist < 48 && approach > 65 && now - lastImpact > 280) {
                        lastImpact = now;
                        const intensity = Math.min(1.6, approach / 130);
                        playImpact(intensity, 0);
                        const midX = (trackers.red.x + trackers.blue.x) / 2;
                        const midY = (trackers.red.y + trackers.blue.y) / 2;
                        spawnParticles(midX, midY, Math.round(14 + intensity * 16), '255,235,150', 1 + intensity * 0.5);
                        screenFlash.alpha = Math.max(screenFlash.alpha, 0.12 + intensity * 0.12);
                        screenFlash.color = '255,240,200';
                    }
                }
                prevPairDist = dist;
            } else {
                prevPairDist = null;
            }

            // Update particles (analysis-space physics)
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.vx *= 0.96;
                p.vy = p.vy * 0.96 + 60 * dt; // slight gravity
                p.life -= p.decay * dt;
                if (p.life <= 0) particles.splice(i, 1);
            }
            
            // === DRAW ===
            ctx.save();
            
            // Background: video (slightly darkened)
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Dark overlay for better visibility of overlays
            ctx.fillStyle = 'rgba(0,0,0,0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const scaleX = canvas.width / analysisW;
            const scaleY = canvas.height / analysisH;
            
            // Draw trackers
            drawTracker('red', scaleX, scaleY);
            if (currentMode === 'duel') {
                drawTracker('blue', scaleX, scaleY);
            }

            // Draw particles
            for (const p of particles) {
                ctx.fillStyle = `rgba(${p.color},${Math.max(0, p.life)})`;
                ctx.beginPath();
                ctx.arc(p.x * scaleX, p.y * scaleY, p.size * (scaleX + scaleY) / 2 * 0.8, 0, Math.PI * 2);
                ctx.fill();
            }

            // Special move banner
            for (const key of ['red', 'blue']) {
                const t = trackers[key];
                if (now < t.specialFlashUntil) {
                    const remain = (t.specialFlashUntil - now) / 900;
                    ctx.fillStyle = `rgba(255,255,255,${Math.min(1, remain * 1.6)})`;
                    ctx.font = `bold ${Math.round(30 + (1 - remain) * 26)}px "Noto Sans JP", system-ui, sans-serif`;
                    ctx.textAlign = 'center';
                    const label = key === 'red' ? '⚡ P1 必殺技!!' : '⚡ P2 必殺技!!';
                    ctx.fillText(label, canvas.width / 2, canvas.height * (key === 'red' ? 0.4 : 0.55));
                }
            }

            // Screen flash
            if (screenFlash.alpha > 0.005) {
                ctx.fillStyle = `rgba(${screenFlash.color},${screenFlash.alpha})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                screenFlash.alpha *= Math.pow(0.02, dt); // fast decay
            }
            
            // Status text
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            ctx.font = '13px "Noto Sans JP", system-ui, sans-serif';
            ctx.textAlign = 'left';
            
            let statusText = '';
            if (trackers.red.active) {
                statusText += `赤: ${Math.round(redSpeed)}px/s  `;
            }
            if (currentMode === 'duel' && trackers.blue.active) {
                statusText += `青: ${Math.round(blueSpeed)}px/s`;
            }
            if (statusText) {
                ctx.fillText(statusText, 18, canvas.height - 22);
            }
            
            ctx.restore();
        }
        
        function drawTracker(key, scaleX, scaleY) {
            const t = trackers[key];
            if (!t.active) return;
            
            const drawX = t.x * scaleX;
            const drawY = t.y * scaleY;
            
            const speed = t.vel;
            const isFast = speed > 45;
            
            // Motion trail (simple)
            ctx.strokeStyle = key === 'red' ? 'rgba(255,90,90,0.35)' : 'rgba(90,160,255,0.35)';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(drawX, drawY);
            ctx.lineTo(drawX - (t.x - t.prevX) * scaleX * 2.2, drawY - (t.y - t.prevY) * scaleY * 2.2);
            ctx.stroke();
            
            // Glow circle
            const glowSize = 11 + Math.min(speed / 9, 22);
            ctx.fillStyle = key === 'red' 
                ? (isFast ? 'rgba(255,80,80,0.3)' : 'rgba(255,100,100,0.18)')
                : (isFast ? 'rgba(80,160,255,0.3)' : 'rgba(100,170,255,0.18)');
            ctx.beginPath();
            ctx.arc(drawX, drawY, glowSize + 8, 0, Math.PI * 2);
            ctx.fill();
            
            // Main orb
            ctx.fillStyle = key === 'red' ? '#ff6b6b' : '#60a5fa';
            ctx.beginPath();
            ctx.arc(drawX, drawY, glowSize, 0, Math.PI * 2);
            ctx.fill();
            
            // Core
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(drawX, drawY, Math.max(3.5, glowSize * 0.35), 0, Math.PI * 2);
            ctx.fill();
            
            // Special-move charge ring (fills as you draw a circle)
            if (t.charge > 0.15) {
                ctx.strokeStyle = key === 'red' ? 'rgba(255,210,90,0.9)' : 'rgba(150,220,255,0.9)';
                ctx.lineWidth = 3.5;
                ctx.beginPath();
                ctx.arc(drawX, drawY, glowSize + 13, -Math.PI / 2, -Math.PI / 2 + t.charge * Math.PI * 2);
                ctx.stroke();
            }

            // Label
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 11px "Noto Sans JP", system-ui, sans-serif';
            ctx.textAlign = 'center';
            const label = key === 'red' ? 'P1' : 'P2';
            ctx.fillText(label, drawX, drawY - glowSize - 8);
        }
        
        function loop() {
            processFrame();
            requestAnimationFrame(loop);
        }
        
        async function startCamera(preferFront = false) {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            
            const constraints = {
                video: {
                    facingMode: preferFront ? 'user' : 'environment',
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                }
            };
            
            try {
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                await video.play();
                
                usingFrontCamera = preferFront;
                
                // Start processing loop once
                if (!window._loopStarted) {
                    window._loopStarted = true;
                    lastFrameTime = performance.now();
                    requestAnimationFrame(loop);
                }
                
                document.getElementById('infoBox').classList.add('hidden');
            } catch (err) {
                alert('カメラへのアクセスが拒否されました。ブラウザの設定でカメラを許可してください。');
                console.error(err);
            }
        }
        
        function cycleTheme() {
            const idx = SOUND_THEMES.findIndex(([key]) => key === soundTheme);
            const [key, label] = SOUND_THEMES[(idx + 1) % SOUND_THEMES.length];
            soundTheme = key;
            document.getElementById('themeBtn').textContent = label;
        }

        function toggleMode() {
            currentMode = currentMode === 'duel' ? 'single' : 'duel';
            const btn = document.getElementById('modeBtn');
            btn.textContent = currentMode === 'duel' ? '2人対戦モード' : '1人モード';
            
            if (currentMode === 'single') {
                trackers.blue.active = false;
            }
        }
        
        async function switchCamera() {
            usingFrontCamera = !usingFrontCamera;
            await startCamera(usingFrontCamera);
        }
        
        function toggleMute() {
            isMuted = !isMuted;
            const btn = document.getElementById('muteBtn');
            btn.textContent = isMuted ? '🔇' : '🔊';
            btn.style.opacity = isMuted ? '0.5' : '1';
        }
        
        function setupUI() {
            document.getElementById('themeBtn').addEventListener('click', cycleTheme);
            document.getElementById('modeBtn').addEventListener('click', toggleMode);
            document.getElementById('cameraBtn').addEventListener('click', switchCamera);
            document.getElementById('muteBtn').addEventListener('click', toggleMute);
            
            // Tap anywhere to init audio (iOS requirement)
            canvas.addEventListener('pointerdown', () => {
                initAudio();
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            });
            
            window.addEventListener('resize', resize);
            
            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key.toLowerCase() === 'm') toggleMute();
                if (e.key.toLowerCase() === 't') cycleTheme();
                if (e.key === ' ') {
                    e.preventDefault();
                    toggleMode();
                }
            });
        }
        
        async function start() {
            resize();
            setupUI();
            
            // Default: start with back camera + duel mode
            await startCamera(false);
            
            // Show initial tip
            setTimeout(() => {
                const info = document.getElementById('infoBox');
                if (!info.classList.contains('hidden')) {
                    info.style.transition = 'opacity 0.6s ease';
                    info.style.opacity = '0.92';
                }
            }, 1800);
            
            console.log('%c[カメラ棒] Color tracking duel prototype ready. Use bright markers on rod tips!', 'color:#555');
        }
        
        start();
    </script>
</body>
